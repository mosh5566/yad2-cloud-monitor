name: Watchdog

on:
  schedule:
    - cron: '*/3 * * * *'    # every 3 minutes
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check Yad2 Monitor health
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
        run: |
          # Count active (in_progress) runs - the chain should always have one
          active=$(gh run list --repo "$REPO" --workflow check.yml --status in_progress \
                   --json databaseId --jq '. | length' 2>/dev/null || echo 0)
          echo "Active runs: $active"

          if [ "$active" -ge 1 ]; then
            echo "OK - chain is alive ($active active)"
            exit 0
          fi

          # No active run - check how long since the last one
          last=$(gh run list --repo "$REPO" --workflow check.yml --limit 1 \
                 --json startedAt --jq '.[0].startedAt')
          if [ -n "$last" ] && [ "$last" != "null" ]; then
            age_min=$(( ($(date +%s) - $(date -d "$last" +%s)) / 60 ))
            echo "No active runs. Last started ${age_min}m ago - restarting chain"
          fi

          # Restart the chain
          gh workflow run check.yml --repo "$REPO" || true
          curl -s "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
            --data-urlencode "text=🔄 Watchdog: chain was down - restarted it" || true
