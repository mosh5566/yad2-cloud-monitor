name: Yad2 Monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # backup trigger (chain is primary)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Set up Chrome + chromedriver
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true

      - name: Schedule next run mid-way (overlap = continuous coverage)
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          nohup bash -c '
            sleep 150
            active=$(gh run list --repo "'"$REPO"'" --workflow check.yml --status in_progress --json databaseId --jq ". | length" 2>/dev/null || echo 0)
            if [ "$active" -le 2 ]; then
              gh workflow run check.yml --repo "'"$REPO"'" || true
            fi
          ' >/dev/null 2>&1 &
          echo "relay scheduled"

      - name: Run monitor
        env:
          ID_INSTANCE: ${{ secrets.ID_INSTANCE }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          PHONE_TO_NOTIFY: ${{ secrets.PHONE_TO_NOTIFY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHROMEDRIVER_PATH: chromedriver
        run: python monitor.py

      - name: Commit updated state
        run: |
          if git diff --quiet state.json 2>/dev/null; then exit 0; fi
          git config user.name "yad2-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "update state $(date -u +%H:%M)" || exit 0
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase || git rebase --abort
            sleep 2
          done
          exit 0
