name: Yad2 Monitor

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:           # also allow manual run

permissions:
  contents: write              # needed to commit state.json back

# No concurrency block - allow overlapping runs so cron isn't skipped
# (state.json conflicts handled via push retry with rebase)

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          ID_INSTANCE: ${{ secrets.ID_INSTANCE }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          PHONE_TO_NOTIFY: ${{ secrets.PHONE_TO_NOTIFY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          if git diff --quiet state.json 2>/dev/null; then
            echo "no state changes"
            exit 0
          fi
          git config user.name "yad2-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "update state $(date -u +%H:%M)" || exit 0
          # Retry with rebase to handle concurrent heartbeat pushes from local
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "push attempt $i failed, pulling and retrying..."
            git pull --rebase || git rebase --abort
            sleep 2
          done
          echo "push failed after 3 attempts (state will be updated next run)"
          exit 0
