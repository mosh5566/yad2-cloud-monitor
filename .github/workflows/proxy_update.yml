name: Proxy Updater

on:
  schedule:
    - cron: '0 * * * *'     # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install requests

      - name: Update proxies
        run: python proxy_updater.py

      - name: Commit proxies
        run: |
          if git diff --quiet proxies.txt 2>/dev/null; then
            echo "no proxy changes"; exit 0
          fi
          git config user.name "yad2-bot"
          git config user.email "bot@users.noreply.github.com"
          git add proxies.txt
          git commit -m "update proxies $(date -u +%H:%M)" || exit 0
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase || git rebase --abort
            sleep 2
          done
          exit 0
